<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog do Felipe</title>
</head>
<body>
    <h1>Biografia de Felipe</h1>
    <h3>Gostaria de conhecer <strong>Felipe Chaves Boll</strong>?</h3>
    <button id="sim"><strong>Sim</strong></button>
    <button id="nao"><Strong>Não</Strong></button>
    <br>
    <br>
    <p id = "biografia"></p>
</body>

    <script>
        const botaoS = document.getElementById("sim")
        const botaoN = document.getElementById("nao")
        const texto = document.getElementById("biografia");
        botaoS.addEventListener('click', function(){
            const imagem = document.createElement("img")
            imagem.src = "felipe.jpg"
            imagem.width = 200

            document.body.appendChild(imagem)

            texto.innerHTML = "<p>Felipe Chaves Boll nascido em Cascavel, Parana em 28 de julho de 2009.</p>"
        })

        botaoN.addEventListener('click', function(){
            alert("Porque acessou o site então seu bobão?")
        })
    </script>
</html>
