<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog do Felipe</title>
</head>

<body>
    <nav class="navbar">
        <div class="nav">Blog do Felipe</div>
    </nav>

    <div class="layout">
        <main class="conteudo">
            <div class="primeiro-bloco">
                <div class="foto">
                    <img src="felipe.jpg">
                </div>
            
                <section class="inicio">
                    <h1>Geral</h1>
                    <p>Felipe Chaves Boll nascido em Cascavel, Parana em 28 de julho de 2009.
                        <br>Estuda no Instituto Federal do Parana campus Cascavel cursando o 3°
                        ano de Informatica, tambem trabalha no escritório de contabilidade Araucaria.
                    </p>

                </section>
            </div>
    </main>


    <aside class="sidebar">
        <h3>Tópicos</h3>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
        </ul>
    </aside>
    </div>


    <style>
        html {
            scroll-behavior: smooth;
        }

        .navbar {
            background-color: #982598;
            font-size: 50px;
            color: #FFD400;
            display: flex;
            padding: 1rem 5%;
        }

        .layout {
            display: flex;
            flex-direction: row-reverse;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
        }

        .conteudo {
            flex: 3;
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
        }

        .sidebar {
            flex: 1;
            background: #f9f9f9;
            padding: 20px;
            border: 3px solid #2c3e50;
        }

        .primeiro-bloco {
            display: flex;
            align-items: flex-start;
            gap: 30px;
        }

        .primeiro-bloco .foto {
            flex: 1;
        }

        .primeiro-bloco .inicio {
            flex: 2;
        }

        .foto img {
            height: 350px;
            border-radius: 10px;
        }
    </style>

</body>

</html>
